# DOMAIN,heic.alicdn.com,REJECT
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Microsoft/Microsoft.list,Proxy
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Google/Google.list,Proxy
RULE-SET,https://raw.githubusercontent.com/Lincorn/test/refs/heads/main/Rule/AdBlock.list,REJECT
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/Notion/Notion.list,Proxy
RULE-SET,https://whatshub.top/rule/PayPal.list,Proxy
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/GitHub/GitHub.list,Proxy
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Twitter/Twitter.list,Proxy
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Facebook/Facebook.list,Instagram
RULE-SET,https://raw.githubusercontent.com/Lincorn/test/refs/heads/main/Rule/AI.list,Proxy
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/TikTok/TikTok.list,Tiktok
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Spotify/Spotify.list,Spotify
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Instagram/Instagram.list,Instagram
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon/Telegram/Telegram.list,Telegram
RULE-SET,https://github.com/Blankwonder/surge-list/raw/master/blocked.list,Proxy
RULE-SET,https://github.com/Blankwonder/surge-list/raw/master/cn.list,DIRECT
DOMAIN,apps.apple.com,DIRECT
DOMAIN-SUFFIX,ls.apple.com,DIRECT // Apple Maps
DOMAIN-SUFFIX,store.apple.com,DIRECT // Apple Store Online
RULE-SET,SYSTEM,Proxy
RULE-SET,https://raw.githubusercontent.com/Lincorn/test/refs/heads/main/Rule/AppleAccount.list,DIRECT
RULE-SET,https://github.com/Blankwonder/surge-list/raw/master/apple.list,DIRECT
# 以下规则将触发本地 DNS 解析
RULE-SET,LAN,DIRECT
GEOIP,CN,DIRECT
FINAL,Proxy,dns-failed

[Host]
iosapps.itunes.apple.com = iosapps.itunes.apple.com.download.ks-cdn.com
updates.cdn-apple.com = updates.jsd.ksyunv5.com
updates.cdn-apple.com.akadns.net = updates.jsd.ksyunv5.com
updates.g.aaplimg.com = updates.jsd.ksyunv5.com

[MITM]
skip-server-cert-verify = true
h2 = true

